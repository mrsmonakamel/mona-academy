<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الكورس - مس منى كامل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
:root{
  --primary:#6C3FC5;--primary-dark:#4A2A8A;--primary-light:#9B6EF0;
  --accent:#FF6B35;--accent2:#FFD93D;--dark:#0D0D1A;--dark2:#13132A;
  --card-bg:#1A1A35;--card-border:rgba(108,63,197,0.3);
  --text:#E8E8F5;--text-muted:#9898C0;--white:#fff;
  --success:#2ECC71;--danger:#E74C3C;
  --gradient:linear-gradient(135deg,#6C3FC5 0%,#FF6B35 100%);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);direction:rtl;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}

/* TOPBAR */
.topbar{background:rgba(13,13,26,.97);border-bottom:1px solid var(--card-border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.back-btn{display:flex;align-items:center;gap:8px;background:rgba(108,63,197,.15);border:1px solid rgba(108,63,197,.3);color:var(--text);padding:8px 16px;border-radius:10px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;font-size:.85rem;text-decoration:none;transition:all .3s}
.back-btn:hover{background:rgba(108,63,197,.3)}
.topbar-title{font-weight:900;font-size:1.1rem;flex:1}
.share-btn{display:flex;align-items:center;gap:8px;background:var(--gradient);border:none;color:white;padding:8px 18px;border-radius:10px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;font-size:.85rem;transition:all .3s}
.share-btn:hover{opacity:.85;transform:translateY(-1px)}
.user-info{font-size:.82rem;color:var(--text-muted);display:flex;align-items:center;gap:6px}

/* MAIN LAYOUT */
.course-layout{display:grid;grid-template-columns:1fr 360px;gap:0;min-height:calc(100vh - 65px)}
.video-area{display:flex;flex-direction:column}
.sidebar{border-right:1px solid var(--card-border);background:var(--dark2);display:flex;flex-direction:column;max-height:calc(100vh - 65px);position:sticky;top:65px}

/* VIDEO PLAYER */
.player-wrap{background:#000;position:relative;padding-bottom:56.25%;width:100%}
.player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:radial-gradient(ellipse at center,rgba(108,63,197,.2) 0%,#000 70%);cursor:pointer}
.player-placeholder .play-icon{width:80px;height:80px;background:var(--gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 0 40px rgba(108,63,197,.5);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(108,63,197,.5)}50%{box-shadow:0 0 70px rgba(108,63,197,.8)}}
.player-placeholder p{color:var(--text-muted);font-size:.9rem}

/* VIDEO INFO BAR */
.video-info-bar{padding:18px 22px;background:var(--dark2);border-bottom:1px solid var(--card-border)}
.video-info-bar h2{font-size:1.05rem;font-weight:800;margin-bottom:4px}
.video-info-bar .meta{font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:10px}

/* SIDEBAR TABS */
.sidebar-tabs{display:flex;border-bottom:1px solid var(--card-border);flex-shrink:0}
.tab-btn{flex:1;padding:13px 8px;background:none;border:none;color:var(--text-muted);font-family:'Cairo',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--primary-light);border-bottom-color:var(--primary)}
.sidebar-content{flex:1;overflow-y:auto;padding:12px}

/* VIDEO LIST */
.video-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .2s;border:1px solid transparent;margin-bottom:6px}
.video-item:hover{background:rgba(108,63,197,.1);border-color:rgba(108,63,197,.2)}
.video-item.active{background:rgba(108,63,197,.2);border-color:var(--primary)}
.video-item.active .vi-num{color:var(--primary-light)}
.vi-thumb{width:72px;height:44px;border-radius:6px;object-fit:cover;background:var(--dark);flex-shrink:0;position:relative}
.vi-thumb-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);border-radius:6px;opacity:0;transition:opacity .2s}
.video-item:hover .vi-thumb-overlay,.video-item.active .vi-thumb-overlay{opacity:1}
.vi-num{width:22px;font-size:.75rem;color:var(--text-muted);font-weight:700;flex-shrink:0;text-align:center}
.vi-name{font-size:.83rem;font-weight:700;line-height:1.3}

/* EXAM LIST */
.exam-item{padding:12px 14px;border-radius:10px;border:1px solid rgba(108,63,197,.3);background:rgba(108,63,197,.06);cursor:pointer;margin-bottom:8px;transition:all .2s}
.exam-item:hover{border-color:var(--primary);background:rgba(108,63,197,.14)}
.exam-item.done{border-color:rgba(46,204,113,.3);background:rgba(46,204,113,.06)}
.exam-item .exam-name{font-size:.85rem;font-weight:700;margin-bottom:4px}
.exam-item .exam-meta{font-size:.75rem;color:var(--text-muted);display:flex;gap:10px;align-items:center}
.exam-item.done .exam-meta{color:#2ECC71}

/* AUTH WALL */
#authWall{display:none;position:fixed;inset:0;background:rgba(13,13,26,.96);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
#authWall.show{display:flex}
.auth-box{background:var(--card-bg);border:1px solid var(--card-border);border-radius:24px;padding:44px 36px;text-align:center;max-width:400px;width:92%}
.auth-box h2{font-size:1.4rem;font-weight:900;margin-bottom:10px}
.auth-box p{color:var(--text-muted);margin-bottom:24px;font-size:.9rem;line-height:1.7}
.auth-box .btn{padding:12px 28px;border-radius:12px;border:none;background:var(--gradient);color:white;font-family:'Cairo',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:8px}
.auth-box .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,63,197,.4)}

/* EXAM PLAYER MODAL */
.exam-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.exam-overlay.open{display:flex}
.exam-box{background:var(--dark2);border:1px solid var(--card-border);border-radius:20px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;padding:28px;position:relative}
.exam-close{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.08);border:none;color:var(--text);width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem}

/* NOTIFICATION */
.notif{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:12px 22px;display:flex;align-items:center;gap:10px;z-index:5000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.notif.success{border-color:rgba(46,204,113,.4)}.notif.success i{color:#2ECC71}
.notif.error{border-color:rgba(231,76,60,.4)}.notif.error i{color:#E74C3C}

/* COURSE HEADER */
.course-header{padding:22px;border-bottom:1px solid var(--card-border);flex-shrink:0}
.course-header .c-name{font-weight:900;font-size:1rem;margin-bottom:4px}
.course-header .c-badge{display:inline-block;background:rgba(108,63,197,.2);border:1px solid rgba(108,63,197,.3);color:var(--primary-light);padding:3px 10px;border-radius:6px;font-size:.75rem;font-weight:700}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:16px}
.spinner{width:48px;height:48px;border:4px solid rgba(108,63,197,.2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MOBILE */
@media(max-width:768px){
  .course-layout{grid-template-columns:1fr}
  .sidebar{max-height:none;position:static;order:2}
  .video-area{order:1}
  .topbar{padding:10px 14px}
  .topbar-title{font-size:.9rem}
  .share-btn span{display:none}
}
</style>
</head>
<body>

<div class="notif" id="notif"><i class="fas fa-check-circle"></i><span id="notifMsg"></span></div>

<!-- AUTH WALL -->
<div id="authWall">
  <div class="auth-box">
    <div style="font-size:3rem;margin-bottom:14px">🔐</div>
    <h2>سجّل دخولك أولاً</h2>
    <p>لازم تكون مسجل دخولك عشان تقدر تشوف محتوى الكورسات وتحل الامتحانات</p>
    <button class="btn" onclick="window.location.href='المنصة_المنتظره.html'">
      <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
    </button>
  </div>
</div>

<!-- EXAM OVERLAY -->
<div class="exam-overlay" id="examOverlay">
  <div class="exam-box">
    <button class="exam-close" onclick="closeExamOverlay()"><i class="fas fa-times"></i></button>
    <div id="examContent"></div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <a href="المنصة_المنتظره.html" class="back-btn">
    <i class="fas fa-arrow-right"></i> <span>رجوع</span>
  </a>
  <div class="topbar-title" id="topbarTitle"><i class="fas fa-book" style="color:var(--primary-light)"></i> جاري التحميل...</div>
  <button class="share-btn" onclick="shareCourse()">
    <i class="fas fa-share-alt"></i><span>مشاركة</span>
  </button>
  <div class="user-info" id="userInfo"></div>
</div>

<!-- LOADING -->
<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <p style="color:var(--text-muted)">جاري تحميل الكورس...</p>
</div>

<!-- COURSE LAYOUT -->
<div class="course-layout" id="courseLayout" style="display:none">

  <!-- VIDEO AREA -->
  <div class="video-area">
    <div class="player-wrap" id="playerWrap">
      <div class="player-placeholder" id="playerPlaceholder" onclick="playFirstVideo()">
        <div class="play-icon"><i class="fas fa-play"></i></div>
        <p>اختار فيديو من القائمة واضغط تشغيل</p>
      </div>
      <iframe id="videoFrame" src="" allowfullscreen allow="autoplay; encrypted-media" style="display:none"></iframe>
    </div>
    <div class="video-info-bar">
      <h2 id="currentVideoName">اختار فيديو من القائمة</h2>
      <div class="meta" id="currentVideoMeta">
        <span id="courseGradeBadge"></span>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="course-header">
      <div class="c-name" id="sidebarCourseName">—</div>
      <span class="c-badge" id="sidebarCourseGrade">—</span>
      <div style="font-size:.77rem;color:var(--text-muted);margin-top:6px" id="sidebarVideoCount"></div>
    </div>

    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('videos',this)">
        <i class="fas fa-video"></i> الفيديوهات
      </button>
      <button class="tab-btn" onclick="switchTab('exams',this)" id="examsTabBtn">
        <i class="fas fa-file-alt"></i> الامتحانات
      </button>
    </div>

    <div class="sidebar-content" id="videosTab"></div>
    <div class="sidebar-content" id="examsTab" style="display:none"></div>
  </div>
</div>

<script>
// ====== FIREBASE CONFIG ======
const firebaseConfig = {
  apiKey: "AIzaSyBalgsZ2MmHFkF7bvAGky0MImzTVgqXTy8",
  authDomain: "monakamel-academy.firebaseapp.com",
  databaseURL: "https://monakamel-academy-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "monakamel-academy",
  storageBucket: "monakamel-academy.firebasestorage.app",
  messagingSenderId: "1012338556086",
  appId: "1:1012338556086:web:1a0ea89ce0bf59268f3a17"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ====== STATE ======
let currentUser = null;
let course = null;
let courseKey = null;
let videos = [];
let courseExams = [];
let allGrades = {};
let activeVideoKey = null;
let examState = { exam:null, key:null, answers:{}, timerInterval:null, timeLeft:0 };

// ====== NOTIFY ======
function notify(msg, type='success') {
  const el = document.getElementById('notif');
  el.querySelector('i').className = type==='success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
  document.getElementById('notifMsg').textContent = msg;
  el.className = 'notif ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3500);
}

// ====== GET COURSE ID FROM URL ======
const urlParams = new URLSearchParams(window.location.search);
courseKey = urlParams.get('id');

if (!courseKey) {
  window.location.href = 'المنصة_المنتظره.html';
}

// ====== AUTH ======
auth.onAuthStateChanged(async user => {
  if (!user) {
    // غير مسجل - اظهر حاجز التسجيل
    document.getElementById('authWall').classList.add('show');
    document.getElementById('loadingScreen').style.display = 'none';
    return;
  }
  // حمّل بيانات الطالب
  try {
    const snap = await db.ref('website/students/' + user.uid).once('value');
    if (snap.exists()) {
      const data = snap.val();
      if (data.banned) {
        document.getElementById('authWall').innerHTML = '<div class="auth-box"><div style="font-size:3rem;margin-bottom:14px">🚫</div><h2>الحساب محظور</h2><p style="color:var(--text-muted)">تم حظر حسابك. تواصل مع الإدارة.</p><button class="btn" onclick="auth.signOut().then(()=>window.location.href=\'المنصة_المنتظره.html\')"><i class="fas fa-sign-out-alt"></i> خروج</button></div>';
        document.getElementById('authWall').classList.add('show');
        return;
      }
      currentUser = { uid: user.uid, _key: user.uid, ...data };
      document.getElementById('userInfo').innerHTML = `<i class="fas fa-user-circle" style="color:var(--primary-light)"></i> ${data.name1 || user.email}`;
    } else if (user.email === 'mrsmonakamel6@gmail.com' || user.email === 'admin@monakamel.com') {
      currentUser = { uid: user.uid, _key: user.uid, name1: 'الأدمن', isAdmin: true };
    } else {
      // جوجل بدون بيانات مكتملة
      currentUser = { uid: user.uid, _key: user.uid, name1: user.displayName || user.email };
    }
  } catch(e) {
    currentUser = { uid: user.uid, _key: user.uid, name1: user.displayName || user.email };
  }
  loadCourse();
});

// ====== LOAD COURSE ======
async function loadCourse() {
  try {
    const snap = await db.ref('website/courses/' + courseKey).once('value');
    if (!snap.exists()) {
      notify('الكورس غير موجود!', 'error');
      setTimeout(() => window.location.href = 'المنصة_المنتظره.html', 2000);
      return;
    }
    course = snap.val();
    videos = course.videos ? Object.entries(course.videos).map(([k,v]) => ({key:k,...v})) : [];

    // تحديث العنوان
    document.title = course.name + ' - مس منى كامل';
    document.getElementById('topbarTitle').innerHTML = `<i class="fas fa-book" style="color:var(--primary-light)"></i> ${course.name}`;
    document.getElementById('sidebarCourseName').textContent = course.name;
    document.getElementById('sidebarCourseGrade').textContent = course.grade;
    document.getElementById('sidebarVideoCount').textContent = `${videos.length} فيديو`;
    document.getElementById('courseGradeBadge').innerHTML = `<span style="background:rgba(108,63,197,.2);color:var(--primary-light);padding:2px 8px;border-radius:5px;font-size:.75rem">${course.grade}</span>`;

    // تحميل الامتحانات
    const examSnap = await db.ref('website/exams_v2').orderByChild('courseKey').equalTo(courseKey).once('value');
    courseExams = examSnap.exists() ? Object.entries(examSnap.val()).map(([k,e]) => ({key:k,...e})) : [];

    // تحديث tab الامتحانات
    if (courseExams.length) {
      document.getElementById('examsTabBtn').innerHTML = `<i class="fas fa-file-alt"></i> الامتحانات (${courseExams.length})`;
    }

    // تحميل درجات الطالب الحالي
    const gradesSnap = await db.ref('website/grades').once('value');
    allGrades = gradesSnap.exists() ? gradesSnap.val() : {};

    renderVideosList();
    renderExamsList();

    // إخفاء شاشة التحميل
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('courseLayout').style.display = 'grid';

  } catch(e) {
    notify('خطأ في تحميل الكورس: ' + e.message, 'error');
    document.getElementById('loadingScreen').innerHTML = '<div style="text-align:center;color:var(--text-muted)"><i class="fas fa-exclamation-circle" style="font-size:2rem;margin-bottom:12px;display:block;color:#E74C3C"></i><p>خطأ في تحميل الكورس</p><a href="المنصة_المنتظره.html" style="color:var(--primary-light);margin-top:12px;display:inline-block">← رجوع للرئيسية</a></div>';
  }
}

// ====== RENDER VIDEO LIST ======
function renderVideosList() {
  const container = document.getElementById('videosTab');
  if (!videos.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted)"><i class="fas fa-video-slash" style="font-size:2rem;margin-bottom:10px;display:block"></i><p>لا يوجد فيديوهات في هذا الكورس بعد</p></div>';
    return;
  }
  container.innerHTML = videos.map((v, i) => `
    <div class="video-item ${v.key === activeVideoKey ? 'active' : ''}" id="vi-${v.key}" onclick="playVideo('${v.key}')">
      <span class="vi-num">${i+1}</span>
      <div style="position:relative;flex-shrink:0">
        <img class="vi-thumb" src="${v.thumb || 'https://img.youtube.com/vi/' + v.ytId + '/mqdefault.jpg'}"
          onerror="this.src='https://img.youtube.com/vi/${v.ytId}/default.jpg'" style="width:72px;height:44px;border-radius:6px;object-fit:cover">
        <div class="vi-thumb-overlay">
          <i class="fas fa-play" style="color:white;font-size:.8rem"></i>
        </div>
      </div>
      <span class="vi-name">${v.name}</span>
    </div>`).join('');
}

// ====== RENDER EXAMS LIST ======
function renderExamsList() {
  const container = document.getElementById('examsTab');
  if (!courseExams.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted)"><i class="fas fa-clipboard" style="font-size:2rem;margin-bottom:10px;display:block"></i><p>لا يوجد امتحانات لهذا الكورس بعد</p></div>';
    return;
  }
  const uid = currentUser ? (currentUser.uid || currentUser._key) : null;
  container.innerHTML = courseExams.map(e => {
    const prev = uid ? Object.values(allGrades).find(g => g.studentUid === uid && g.examKey === e.key) : null;
    const pct = prev && prev.total ? Math.round((prev.score/prev.total)*100) : null;
    return `<div class="exam-item ${prev?'done':''}" onclick="openExam('${e.key}')">
      <div class="exam-name">${e.title}</div>
      <div class="exam-meta">
        ${prev
          ? `<i class="fas fa-check-circle"></i> ${prev.score}/${prev.total} — ${pct}%`
          : `<span><i class="fas fa-file-alt"></i> ${e.questions?.length||0} سؤال</span>
             <span><i class="fas fa-clock"></i> ${e.timer ? e.timer+' دقيقة' : 'بدون وقت'}</span>`}
      </div>
    </div>`;
  }).join('');
}

// ====== PLAY VIDEO ======
function playVideo(videoKey) {
  const v = videos.find(vi => vi.key === videoKey);
  if (!v) return;
  activeVideoKey = videoKey;

  // تحديث الـ player
  const placeholder = document.getElementById('playerPlaceholder');
  const frame = document.getElementById('videoFrame');
  placeholder.style.display = 'none';
  frame.style.display = 'block';
  frame.src = `https://www.youtube.com/embed/${v.ytId}?autoplay=1&rel=0`;

  // تحديث المعلومات
  document.getElementById('currentVideoName').textContent = v.name;

  // تحديث القائمة
  document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
  const activeEl = document.getElementById('vi-' + videoKey);
  if (activeEl) {
    activeEl.classList.add('active');
    activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function playFirstVideo() {
  if (videos.length) playVideo(videos[0].key);
}

// ====== TABS ======
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('videosTab').style.display = tab === 'videos' ? 'block' : 'none';
  document.getElementById('examsTab').style.display = tab === 'exams' ? 'block' : 'none';
}

// ====== SHARE ======
function shareCourse() {
  const url = window.location.href;
  const text = course ? '📚 كورس ' + course.name + ' (' + course.grade + ') على منصة مس منى كامل' : 'منصة مس منى كامل';
  if (navigator.share) {
    navigator.share({ title: course?.name || 'الكورس', text, url });
  } else {
    navigator.clipboard.writeText(url).then(() => notify('تم نسخ رابط الكورس 🔗'));
  }
}

// ====== EXAM PLAYER ======
async function openExam(examKey) {
  if (!currentUser) { notify('سجّل دخولك أولاً 🔐', 'error'); return; }
  const examData = courseExams.find(e => e.key === examKey);
  if (!examData) return;

  const uid = currentUser.uid || currentUser._key;
  const prev = Object.values(allGrades).find(g => g.studentUid === uid && g.examKey === examKey);
  if (prev) {
    const pct = prev.total ? Math.round((prev.score/prev.total)*100) : 0;
    document.getElementById('examContent').innerHTML = `
      <div style="text-align:center;padding:28px 0">
        <div style="font-size:3rem;margin-bottom:12px">🔒</div>
        <h2 style="font-size:1.15rem;font-weight:900;margin-bottom:8px">أجريت هذا الامتحان من قبل</h2>
        <p style="color:var(--text-muted);font-size:.88rem;margin-bottom:18px">الامتحان يُحل مرة واحدة فقط</p>
        <div style="font-size:2.2rem;font-weight:900;color:${pct>=50?'#2ECC71':'#E74C3C'}">${prev.score} / ${prev.total}</div>
        <div style="color:var(--text-muted);margin-top:6px">نسبتك: <strong style="color:${pct>=50?'#2ECC71':'#E74C3C'}">${pct}%</strong></div>
        <button onclick="closeExamOverlay()" style="margin-top:22px;padding:10px 26px;border-radius:10px;border:none;background:var(--gradient);color:white;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer">إغلاق</button>
      </div>`;
    document.getElementById('examOverlay').classList.add('open');
    return;
  }

  examState = { exam: examData, key: examKey, answers: {}, timerInterval: null, timeLeft: examData.timer ? examData.timer*60 : 0 };
  renderExamPlayer();
  document.getElementById('examOverlay').classList.add('open');
}

function closeExamOverlay() {
  if (examState.timerInterval) clearInterval(examState.timerInterval);
  document.getElementById('examOverlay').classList.remove('open');
  document.getElementById('examContent').innerHTML = '';
  examState = { exam:null, key:null, answers:{}, timerInterval:null, timeLeft:0 };
}

function renderExamPlayer() {
  const { exam } = examState;
  let timerHtml = '';
  if (exam.timer) {
    timerHtml = `<div id="examTimer" style="background:rgba(108,63,197,.15);border:1px solid rgba(108,63,197,.3);border-radius:10px;padding:10px 16px;text-align:center;font-size:1.1rem;font-weight:800;margin-bottom:16px;color:var(--primary-light)">
      <i class="fas fa-clock"></i> <span id="timerDisplay">${fmtTime(examState.timeLeft)}</span>
    </div>`;
  }
  const qHtml = (exam.questions||[]).map((q,qi) => {
    if (q.type === 'tf') return `
      <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:16px;margin-bottom:12px;border-right:3px solid var(--primary)">
        <div style="font-weight:700;margin-bottom:10px;font-size:.9rem">${qi+1}. ${q.text}</div>
        <div style="display:flex;gap:8px">
          <button class="tf-btn" id="tf-${qi}-true" onclick="answerTF(${qi},true)" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text);font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;transition:all .2s">✅ صح</button>
          <button class="tf-btn" id="tf-${qi}-false" onclick="answerTF(${qi},false)" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text);font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;transition:all .2s">❌ خطأ</button>
        </div>
      </div>`;
    return `
      <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:16px;margin-bottom:12px;border-right:3px solid var(--primary)">
        <div style="font-weight:700;margin-bottom:10px;font-size:.9rem">${qi+1}. ${q.text}</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${(q.options||[]).map(o => `
            <button class="mcq-btn" id="mcq-${qi}-${o.letter}" onclick="answerMCQ(${qi},'${o.letter}')"
              style="padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text);font-family:'Cairo',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;text-align:right;display:flex;justify-content:space-between">
              <span>${o.text}</span><span style="color:var(--text-muted)">${o.letter}</span>
            </button>`).join('')}
        </div>
      </div>`;
  }).join('');

  document.getElementById('examContent').innerHTML = `
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:1.4rem;margin-bottom:6px">📝</div>
      <h2 style="font-size:1.1rem;font-weight:900">${exam.title}</h2>
      <p style="color:var(--text-muted);font-size:.82rem">${exam.questions?.length||0} سؤال ${exam.timer ? '· '+exam.timer+' دقيقة' : ''}</p>
    </div>
    ${timerHtml}${qHtml}
    <button onclick="submitExam()" style="width:100%;padding:13px;border-radius:12px;border:none;background:var(--gradient);color:white;font-family:'Cairo',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;margin-top:6px">
      <i class="fas fa-paper-plane"></i> تسليم الامتحان
    </button>`;

  if (exam.timer) startTimer();
}

function fmtTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function startTimer() {
  examState.timerInterval = setInterval(() => {
    examState.timeLeft--;
    const el = document.getElementById('timerDisplay');
    if (el) el.textContent = fmtTime(examState.timeLeft);
    if (examState.timeLeft <= 60 && el) el.style.color = '#E74C3C';
    if (examState.timeLeft <= 0) { clearInterval(examState.timerInterval); submitExam(); }
  }, 1000);
}

function answerMCQ(qi, letter) {
  examState.answers[qi] = letter;
  const q = examState.exam.questions[qi];
  (q.options||[]).forEach(o => {
    const btn = document.getElementById(`mcq-${qi}-${o.letter}`);
    if (btn) {
      btn.style.background = o.letter===letter ? 'rgba(108,63,197,.3)' : 'rgba(255,255,255,.04)';
      btn.style.borderColor = o.letter===letter ? 'var(--primary)' : 'rgba(255,255,255,.1)';
    }
  });
}

function answerTF(qi, val) {
  examState.answers[qi] = val;
  ['true','false'].forEach(v => {
    const btn = document.getElementById(`tf-${qi}-${v}`);
    if (btn) {
      const match = (v==='true')===val;
      btn.style.background = match ? 'rgba(108,63,197,.3)' : 'rgba(255,255,255,.04)';
      btn.style.borderColor = match ? 'var(--primary)' : 'rgba(255,255,255,.1)';
    }
  });
}

function submitExam() {
  if (examState.timerInterval) clearInterval(examState.timerInterval);
  const { exam } = examState;
  const questions = exam.questions || [];
  const unanswered = questions.filter((_,qi) => examState.answers[qi] === undefined).length;
  if (unanswered > 0 && examState.timeLeft > 0) {
    if (!confirm(`لسه فيه ${unanswered} سؤال مش مجاوب، هتسلم؟`)) {
      if (exam.timer) startTimer();
      return;
    }
  }
  let score = 0;
  questions.forEach((q,qi) => {
    const ans = examState.answers[qi];
    if (q.type==='tf' && ans===q.answer) score++;
    if (q.type==='mcq' && ans===q.answer) score++;
  });
  const total = questions.length;
  const pct = total ? Math.round(score/total*100) : 0;
  const passed = pct >= 50;

  // حفظ الدرجة في Firebase
  if (currentUser) {
    const name = [currentUser.name1,currentUser.name2,currentUser.name3,currentUser.name4].filter(Boolean).join(' ') || currentUser.name || currentUser.email || '—';
    db.ref('website/grades').push({
      studentUid: currentUser._key || currentUser.uid,
      studentName: name,
      studentGrade: currentUser.grade || '—',
      examKey: examState.key,
      examTitle: exam.title,
      score, total,
      date: new Date().toLocaleDateString('ar-EG')
    });
    // إضافة تلقائية لقائمة الشرف لو 100%
    if (total > 0 && score === total) {
      db.ref('website/scores').push({
        name, grade: currentUser.grade || '—',
        exam: exam.title, mark: `${score}/${total}`,
        time: new Date().toLocaleDateString('ar-EG'), auto: true
      });
    }
  }

  document.getElementById('examContent').innerHTML = `
    <div style="text-align:center;padding:28px 0">
      <div style="font-size:3.5rem;margin-bottom:14px">${passed?'🎉':'😔'}</div>
      <h2 style="font-size:1.3rem;font-weight:900;margin-bottom:8px">${passed?'مبروك! ناجح 🎉':'حاول تاني 💪'}</h2>
      <div style="font-size:2.2rem;font-weight:900;color:${passed?'#2ECC71':'#E74C3C'};margin:14px 0">${score} / ${total}</div>
      <div style="color:var(--text-muted);margin-bottom:20px">نسبتك: <strong style="color:${passed?'#2ECC71':'#E74C3C'}">${pct}%</strong></div>
      <div style="display:flex;flex-direction:column;gap:8px;max-width:280px;margin:0 auto">
        ${questions.map((q,qi) => {
          const ans = examState.answers[qi];
          const correct = ans === q.answer;
          return `<div style="display:flex;justify-content:space-between;font-size:.8rem;padding:7px 12px;border-radius:7px;background:${correct?'rgba(46,204,113,.1)':'rgba(231,76,60,.1)'};border:1px solid ${correct?'rgba(46,204,113,.3)':'rgba(231,76,60,.3)'}">
            <span>سؤال ${qi+1}</span><span>${correct?'✅ صح':'❌ غلط'}</span></div>`;
        }).join('')}
      </div>
      <button onclick="closeExamOverlay()" style="margin-top:22px;padding:11px 28px;border-radius:10px;border:none;background:var(--gradient);color:white;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer">
        <i class="fas fa-times"></i> إغلاق
      </button>
    </div>`;

  // تحديث قائمة الامتحانات
  db.ref('website/grades').once('value').then(s => {
    allGrades = s.exists() ? s.val() : {};
    renderExamsList();
  });
}
</script>
</body>
</html>
