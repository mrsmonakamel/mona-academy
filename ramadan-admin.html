<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة أسئلة رمضان | Ms. Mona Kamel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(145deg, #1a2639, #0c1a2b);
            min-height: 100vh;
            font-family: 'Cairo', 'Tahoma', sans-serif;
        }

        /* ================ TOAST ================ */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast-msg {
            background: #1e2d40;
            color: white;
            padding: 14px 22px;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            pointer-events: auto;
            border-right: 4px solid #00b894;
            max-width: 360px;
            animation: toastIn 0.3s ease;
        }

        .toast-msg.error { border-right-color: #ff7675; }
        .toast-msg.warning { border-right-color: #ffd700; }

        @keyframes toastIn {
            from { transform: translateX(30px); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }
        @keyframes toastOut {
            from { transform: translateX(0); opacity: 1; }
            to   { transform: translateX(30px); opacity: 0; }
        }

        /* ================ CONFIRM DIALOG ================ */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .confirm-box {
            background: linear-gradient(145deg, #1e2d40, #162030);
            border: 2px solid rgba(255,215,0,0.4);
            border-radius: 20px;
            padding: 35px 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .confirm-box h3 {
            color: #ffd700;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .confirm-box p {
            color: #ccc;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .confirm-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .confirm-btns button {
            padding: 12px 30px;
            border-radius: 12px;
            border: none;
            font-family: 'Cairo';
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .confirm-ok {
            background: linear-gradient(135deg, #ff7675, #d63031);
            color: white;
        }

        .confirm-cancel {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.2) !important;
        }

        /* ================ LAYOUT ================ */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-login {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #ffd700;
            text-align: center;
        }

        .admin-login h2 {
            color: #ffd700;
            margin-bottom: 30px;
        }

        .admin-login button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            border-radius: 10px;
            color: #1a2639;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Cairo';
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .admin-login button:hover { opacity: 0.9; transform: translateY(-1px); }
        .admin-login button img { width: 24px; height: 24px; }

        .ramadan-admin-panel { color: white; }

        .ramadan-admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .ramadan-admin-header h2 {
            color: #ffd700;
            font-size: 2rem;
            margin: 0;
        }

        .header-buttons { display: flex; gap: 10px; }

        .ramadan-admin-close, .ramadan-admin-logout {
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
            border: none;
            transition: 0.2s;
        }

        .ramadan-admin-close {
            background: rgba(255,255,255,0.1);
            border: 1px solid #ffd700 !important;
            color: #ffd700;
        }

        .ramadan-admin-close:hover { background: rgba(255,215,0,0.15); }

        .ramadan-admin-logout { background: #ff7675; color: white; }
        .ramadan-admin-logout:hover { background: #d63031; }

        /* ================ STATS ================ */
        .ramadan-admin-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .ramadan-admin-stats { grid-template-columns: repeat(2, 1fr); }
        }

        .ramadan-stat-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
            transition: 0.3s;
        }

        .ramadan-stat-card:hover { transform: translateY(-3px); border-color: #ffd700; }

        .ramadan-stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .ramadan-stat-label { color: #ccc; margin-top: 10px; }

        /* ================ ACTIONS ================ */
        .ramadan-admin-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .ramadan-admin-btn {
            padding: 12px 25px;
            border-radius: 10px;
            font-family: 'Cairo';
            font-size: 1rem;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s;
        }

        .ramadan-admin-btn:hover { background: rgba(255,215,0,0.2); }
        .ramadan-admin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .ramadan-admin-btn-primary {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1a2639;
            border: none;
            font-weight: bold;
        }

        .ramadan-admin-btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .ramadan-admin-btn-danger {
            background: linear-gradient(135deg, #ff7675, #d63031);
            color: white;
            border: none;
        }

        /* ================ FORM ================ */
        .ramadan-admin-form {
            background: rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,215,0,0.2);
            display: none;
        }

        .ramadan-admin-form.active { display: block; animation: fadeInDown 0.3s ease; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .ramadan-admin-form label {
            color: #ffd700;
            display: block;
            margin: 15px 0 5px;
            font-weight: 600;
        }

        .ramadan-admin-form input,
        .ramadan-admin-form textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            color: white;
            font-family: 'Cairo';
            font-size: 1rem;
            transition: 0.2s;
        }

        .ramadan-admin-form input:focus,
        .ramadan-admin-form textarea:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255,215,0,0.08);
        }

        .ramadan-admin-form input.error,
        .ramadan-admin-form textarea.error {
            border-color: #ff7675;
        }

        .ramadan-admin-form textarea { resize: vertical; }

        /* ================ SURAHS GRID ================ */
        .ramadan-surahs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .ramadan-surah-item {
            padding: 8px 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            color: #ddd;
            font-size: 0.85rem;
        }

        .ramadan-surah-item:hover {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
        }

        .ramadan-surah-item.selected {
            background: rgba(255,215,0,0.3);
            border-color: #ffd700;
            color: #ffd700;
            font-weight: bold;
        }

        /* ================ QUESTION CARDS ================ */
        .question-card {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
            border-right: 4px solid #ffd700;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .question-card:hover { background: rgba(255,255,255,0.11); }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .question-day { color: #ffd700; font-weight: bold; font-size: 1.1rem; }
        .question-text { color: white; margin: 10px 0; font-size: 1.05rem; line-height: 1.7; }

        .question-answer {
            background: rgba(0,184,148,0.15);
            padding: 10px 15px;
            border-radius: 8px;
            border-right: 3px solid #00b894;
            color: #00b894;
            margin: 10px 0;
            font-weight: 600;
        }

        .question-reference { color: #ffd700; font-size: 0.9rem; margin-top: 8px; }

        /* ================ ANALYSIS BARS ================ */
        .ramadan-analysis-bar {
            height: 18px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 0;
        }

        .ramadan-analysis-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        /* ================ ANSWERS TABLE ================ */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 15px;
            border: 1px solid rgba(255,215,0,0.15);
            max-height: 500px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .answers-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            min-width: 800px;
        }

        .answers-table th,
        .answers-table td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,215,0,0.15);
            font-size: 0.9rem;
        }

        .answers-table th {
            background: rgba(255,215,0,0.15);
            color: #ffd700;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .answers-table tr:hover { background: rgba(255,255,255,0.05); }

        .status-correct { color: #00b894; font-weight: bold; }
        .status-wrong   { color: #ff7675; font-weight: bold; }

        /* ================ FILTER ================ */
        .filter-input {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,215,0,0.4);
            background: rgba(255,255,255,0.08);
            color: white;
            font-family: 'Cairo';
            font-size: 0.95rem;
            min-width: 200px;
        }

        .filter-input::placeholder { color: rgba(255,255,255,0.4); }
        .filter-input:focus { outline: none; border-color: #ffd700; }

        /* ================ SECTION TITLES ================ */
        .section-title {
            color: #ffd700;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,215,0,0.3);
        }

        /* ================ EMPTY STATE ================ */
        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px;
            font-size: 1rem;
        }

        /* ================ LOADING ================ */
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,215,0,0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ================ MOBILE OPTIMIZATIONS ================ */
        @media (max-width: 600px) {
            .ramadan-admin-actions {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-input {
                width: 100%;
            }
            
            .ramadan-admin-btn {
                width: 100%;
            }
            
            .confirm-box {
                padding: 25px 20px;
            }
            
            .confirm-btns {
                flex-direction: column;
            }
        }

        /* ================ PRINT STYLES ================ */
        @media print {
            .ramadan-admin-actions,
            .ramadan-admin-header button,
            .question-header button,
            .ramadan-admin-form {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="admin-container" id="adminContainer">
        <div id="adminLogin" class="admin-login">
            <h2>🌙 دخول إدارة رمضان</h2>
            <p style="color:#ccc; margin-bottom:10px;">مخصص للأدمن فقط</p>
            <button onclick="loginWithGoogle()" id="googleLoginBtn">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ================ FIREBASE CONFIG ================
        const firebaseConfig = {
            apiKey: "AIzaSyA8KQAQgu4nIiomoDpoTLnBz_uAtab63sY",
            authDomain: "monaacademy-cd983.firebaseapp.com",
            databaseURL: "https://monaacademy-cd983-default-rtdb.firebaseio.com",
            projectId: "monaacademy-cd983",
            storageBucket: "monaacademy-cd983.appspot.com",
            appId: "1:410646694761:web:bea49c51d3b0ff5eb9cbf8"
        };

        const app  = initializeApp(firebaseConfig);
        const db   = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ================ CONSTANTS ================
        const SUPER_ADMIN_EMAIL = "mrsmonakamel6@gmail.com";
        const CACHE_DURATION = 5 * 60 * 1000; // 5 دقائق

        // ================ CACHE SYSTEM ================
        const cache = {
            questions: { data: null, timestamp: null },
            answers: { data: null, timestamp: null }
        };

        // ================ GLOBAL LISTENERS ================
        let questionsListener = null;
        let answersListener   = null;
        let questionsRef      = null;
        let answersRef        = null;

        // ================ DEBOUNCE FUNCTION ================
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // ================ ESCAPE HTML ================
        function escapeHTML(str) {
            if (str === null || str === undefined) return '';
            if (typeof str !== 'string') str = String(str);
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ================ TOAST ================
        function showToast(message, type = 'success', duration = 3500) {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            
            const icon = type === 'success' ? 'fa-check-circle' : 
                        type === 'error' ? 'fa-exclamation-circle' : 
                        'fa-exclamation-triangle';
            
            const toast = document.createElement('div');
            toast.className = `toast-msg ${type}`;
            
            // عدم استخدام escapeHTML للرسائل التي تحتوي على أيقونات
            const span = document.createElement('span');
            span.textContent = message;
            toast.appendChild(document.createElement('i')).className = `fas ${icon}`;
            toast.appendChild(span);
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'toastOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }
        window.showToast = showToast;

        // ================ CONFIRM DIALOG ================
        function showConfirm(message, onConfirm) {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
                <div class="confirm-box">
                    <h3><i class="fas fa-exclamation-triangle" style="color:#ffd700;"></i> تأكيد</h3>
                    <p>${escapeHTML(message)}</p>
                    <div class="confirm-btns">
                        <button class="confirm-ok" id="confirmOk">نعم، متأكد</button>
                        <button class="confirm-cancel" id="confirmCancel">إلغاء</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            // إغلاق عند الضغط خارج الصندوق
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.remove();
            });
            
            document.getElementById('confirmOk').onclick = () => { 
                overlay.remove(); 
                onConfirm(); 
            };
            
            document.getElementById('confirmCancel').onclick = () => overlay.remove();
        }

        // ================ CHECK ADMIN PERMISSIONS ================
        async function checkAdminPermission(userEmail, action) {
            if (userEmail === SUPER_ADMIN_EMAIL) return true;
            
            try {
                const adminsSnap = await get(ref(db, 'admins'));
                const admins = adminsSnap.val() || {};
                return Object.values(admins).some(a =>
                    a.email && a.email.toLowerCase() === userEmail.toLowerCase() && 
                    (!action || a.permissions?.includes(action))
                );
            } catch(e) {
                return false;
            }
        }

        // ================ SURAHS LIST ================
        const SURAHS = [
            "الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
            "هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
            "الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
            "لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
            "فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
            "الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
            "الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
            "نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
            "التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
            "الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
            "القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر",
            "المسد","الإخلاص","الفلق","الناس"
        ];

        // ================ GET RAMADAN DAY ================
        function getCurrentRamadanDay() {
            const now = new Date();
            const year = now.getFullYear();
            
            // تواريخ رمضان للسنوات القادمة (يمكن تحديثها سنوياً)
            const ramadanDates = {
                2024: new Date(2024, 2, 11), // 11 مارس 2024
                2025: new Date(2025, 1, 28), // 28 فبراير 2025
                2026: new Date(2026, 1, 17), // 17 فبراير 2026
            };
            
            const ramadanStart = ramadanDates[year] || ramadanDates[2024];
            const diffDays = Math.floor((now - ramadanStart) / (1000 * 60 * 60 * 24)) + 1;
            
            return Math.min(30, Math.max(1, diffDays));
        }

        // ================ AUTH STATE ================
        onAuthStateChanged(auth, async (user) => {
            const loginBtn = document.getElementById('googleLoginBtn');
            if (loginBtn) loginBtn.disabled = true;
            
            if (user) {
                try {
                    let isAllowed = user.email === SUPER_ADMIN_EMAIL;

                    if (!isAllowed) {
                        isAllowed = await checkAdminPermission(user.email);
                    }

                    if (isAllowed) {
                        document.getElementById('adminLogin').style.display = 'none';
                        document.getElementById('ramadanAdminPanel').style.display = 'block';
                        loadAdminPanel();
                    } else {

        // ================ CHECK IF DAY EXISTS ================
        async function checkDayExists(day, excludeId = null) {
            const questionsSnap = await get(ref(db, 'ramadan_questions'));
            if (!questionsSnap.exists()) return false;
            
            let exists = false;
            questionsSnap.forEach(child => {
                const q = child.val();
                if (q.day === day && child.key !== excludeId) {
                    exists = true;
                }
            });
            return exists;
        }

        // ================ SAVE QUESTION ================
        window.saveQuestion = async function() {
            const editingId   = document.getElementById('editingQuestionId').value;
            const day         = parseInt(document.getElementById('questionDay').value);
            const text        = document.getElementById('questionText').value.trim();
            const selectedSurah = document.querySelector('.ramadan-surah-item.selected');
            const ayaNumber   = document.getElementById('ayaNumber').value;
            const tafseer     = document.getElementById('tafseer').value.trim();

            // Reset error states
            document.getElementById('questionDay').classList.remove('error');
            document.getElementById('questionText').classList.remove('error');

            let hasError = false;

            if (!day || day < 1 || day > 30) {
                showToast('❌ يرجى إدخال يوم صحيح (1-30)', 'error');
                document.getElementById('questionDay').classList.add('error');
                hasError = true;
            }

            if (!text) {
                showToast('❌ يرجى إدخال نص السؤال', 'error');
                document.getElementById('questionText').classList.add('error');
                hasError = true;
            }

            if (!selectedSurah || !ayaNumber) {
                showToast('❌ يرجى اختيار السورة ورقم الآية', 'error');
                hasError = true;
            }

            if (hasError) return;

            // Check if day already exists (for new questions)
            if (!editingId) {
                const dayExists = await checkDayExists(day);
                if (dayExists) {
                    showToast('❌ يوجد سؤال لهذا اليوم بالفعل', 'error');
                    document.getElementById('questionDay').classList.add('error');
                    return;
                }
            }

            const correctAnswerText = `${selectedSurah.textContent} - ${ayaNumber}`;
            const questionData = {
                day: day,
                text,
                correctAnswer: correctAnswerText,
                surah: selectedSurah.textContent,
                aya: parseInt(ayaNumber),
                tafseer: tafseer || '',
                isActive: true
            };

            try {
                const saveBtn = document.getElementById('saveQuestionBtn');
                saveBtn.disabled = true;
                saveBtn.innerHTML = '<span class="loading-spinner"></span> جاري الحفظ...';

                if (editingId) {
                    await update(ref(db, `ramadan_questions/${editingId}`), {
                        ...questionData,
                        updatedAt: Date.now()
                    });
                    showToast('✅ تم تحديث السؤال بنجاح');
                } else {
                    await push(ref(db, 'ramadan_questions'), {
                        ...questionData,
                        createdAt: Date.now()
                    });
                    showToast('✅ تم حفظ السؤال بنجاح');
                }

                cancelQuestionForm();
            } catch (error) {
                showToast('❌ حدث خطأ: ' + (error.message || ''), 'error');
            } finally {
                const btn = document.getElementById('saveQuestionBtn');
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-save"></i> حفظ السؤال';
                }
            }
        };

        // ================ UPDATE STATS ================
        async function updateStats() {
            try {
                const answersSnap = cache.answers?.data || await get(ref(db, 'ramadan_answers'));
                if (!answersSnap.exists()) {
                    ['totalAnswers','todayAnswers','correctAnswers'].forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.textContent = '0';
                    });
                    return;
                }

                let total = 0, todayCount = 0, correct = 0;
                const todayStr = new Date().toLocaleDateString('ar-EG', { timeZone: 'Africa/Cairo' });

                answersSnap.forEach(child => {
                    const ans = child.val();
                    total++;
                    if (ans.date === todayStr) todayCount++;
                    if (ans.isCorrect) correct++;
                });

                const set_ = (id, val) => { 
                    const el = document.getElementById(id); 
                    if(el) el.textContent = val; 
                };
                
                set_('totalAnswers', total);
                set_('todayAnswers', todayCount);
                set_('correctAnswers', correct);
            } catch(e) { 
                console.error('Error updating stats:', e);
            }
        }

        // ================ RENDER ANSWERS TABLE ================
        function renderAnswersTable(snapshot) {
            const tbody = document.getElementById('answersTableBody');
            if (!tbody) return;

            if (!snapshot.exists()) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">لا توجد إجابات بعد</td></tr>';
                return;
            }

            // استخدام cached questions إذا كانت متاحة
            const questionsPromise = cache.questions?.data ? 
                Promise.resolve(cache.questions.data) : 
                get(ref(db, 'ramadan_questions'));

            questionsPromise.then(questionsSnap => {
                const correctAnswersMap = {};
                if (questionsSnap.exists()) {
                    questionsSnap.forEach(child => {
                        const q = child.val();
                        correctAnswersMap[q.day] = q.correctAnswer;
                    });
                }

                const answers = [];
                snapshot.forEach(child => answers.push({ id: child.key, ...child.val() }));

                // الترتيب حسب التاريخ (الأحدث أولاً)
                answers.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                let rows = '';
                answers.forEach(ans => {
                    const correctAns = correctAnswersMap[ans.day] || 'غير معروف';
                    rows += `
                        <tr>
                            <td>${escapeHTML(String(ans.day || '—'))}</td>
                            <td>${escapeHTML(ans.name || '—')}</td>
                            <td style="font-family:monospace; direction:ltr;">${escapeHTML(ans.studentId || 'غير محدد')}</td>
                            <td>${escapeHTML(ans.answer || '—')}</td>
                            <td style="color:#ffd700;">${escapeHTML(correctAns)}</td>
                            <td class="${ans.isCorrect ? 'status-correct' : 'status-wrong'}">
                                ${ans.isCorrect ? '✓ صحيحة' : '✗ خاطئة'}
                            </td>
                            <td>${escapeHTML(ans.date || '—')}</td>
                        </tr>
                    `;
                });

                tbody.innerHTML = rows || '<tr><td colspan="7" class="empty-state">لا توجد إجابات</td></tr>';
            }).catch(() => {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">خطأ في تحميل الإجابات</td></tr>';
            });
        }

        // ================ FILTER ANSWERS ================
        window.filterAnswers = function() {
            const filter = document.getElementById('studentIdFilter')?.value.trim().toLowerCase() || '';
            const rows = document.querySelectorAll('#answersTableBody tr');
            
            rows.forEach(row => {
                if (row.cells.length < 3) return;
                const studentIdCell = row.cells[2];
                if (!studentIdCell) return;
                
                const studentId = studentIdCell.textContent.toLowerCase();
                row.style.display = (filter === '' || studentId.includes(filter)) ? '' : 'none';
            });
        };

        // ================ RENDER ANALYSIS ================
        function renderAnalysis(snapshot) {
            const analysisContent = document.getElementById('analysisContent');
            if (!analysisContent) return;

            if (!snapshot.exists()) {
                analysisContent.innerHTML = '<div class="empty-state">لا توجد إجابات بعد</div>';
                return;
            }

            const answersByDay = {};
            const correctByDay = {};

            snapshot.forEach(child => {
                const answer = child.val();
                const day = answer.day;
                if (!answersByDay[day]) { 
                    answersByDay[day] = 0; 
                    correctByDay[day] = 0; 
                }
                answersByDay[day]++;
                if (answer.isCorrect) correctByDay[day]++;
            });

            let html = '';
            for (let day = 1; day <= 30; day++) {
                const total   = answersByDay[day] || 0;
                const correct = correctByDay[day] || 0;
                const pct     = total > 0 ? Math.round((correct / total) * 100) : 0;

                html += `
                    <div style="margin-bottom:15px;">
                        <div style="display:flex; justify-content:space-between; color:white; margin-bottom:5px; font-size:0.9rem;">
                            <span>📅 اليوم ${day}</span>
                            <span style="color:#ffd700;">${correct} / ${total} — ${pct}%</span>
                        </div>
                        <div class="ramadan-analysis-bar">
                            <div class="ramadan-analysis-fill" style="width:${pct}%;"></div>
                        </div>
                    </div>
                `;
            }

            analysisContent.innerHTML = html;
        }

        // ================ EXPORT CSV ================
        window.exportAnswers = async function(triggerEl) {
            try {
                const exportBtn = triggerEl || null;
                if (exportBtn) {
                    exportBtn.disabled = true;
                    exportBtn.innerHTML = '<span class="loading-spinner"></span> جاري التصدير...';
                }

                const [answersSnap, questionsSnap] = await Promise.all([
                    get(ref(db, 'ramadan_answers')),
                    get(ref(db, 'ramadan_questions'))
                ]);

                if (!answersSnap.exists()) {
                    showToast('❌ لا توجد إجابات للتصدير', 'error');
                    return;
                }

                const questions = {};
                if (questionsSnap.exists()) {
                    questionsSnap.forEach(child => {
                        const q = child.val();
                        questions[q.day] = q.correctAnswer;
                    });
                }

                const answers = [];
                answersSnap.forEach(child => answers.push(child.val()));
                answers.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                const escCsv = val => {
                    if (val === null || val === undefined) return '""';
                    const str = String(val).replace(/"/g, '""');
                    return `"${str}"`;
                };

                const csv = [
                    ['اليوم','الاسم','كود الطالب','الإجابة','الإجابة الصحيحة','صحيحة؟','التاريخ'],
                    ...answers.map(a => [
                        a.day, 
                        a.name, 
                        a.studentId || '',
                        a.answer, 
                        questions[a.day] || 'غير معروف',
                        a.isCorrect ? 'نعم' : 'لا', 
                        a.date
                    ])
                ].map(row => row.map(escCsv).join(',')).join('\n');

                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `ramadan_answers_${new Date().toISOString().slice(0,10)}.csv`;
                link.click();
                
                showToast('✅ تم تصدير الملف بنجاح');
                
                setTimeout(() => URL.revokeObjectURL(link.href), 100);
            } catch (error) {
                showToast('❌ خطأ في التصدير: ' + (error.message || ''), 'error');
            } finally {
                // triggerEl تم تمريره كمعامل (إصلاح #44)
                if (triggerEl) {
                    triggerEl.disabled = false;
                    triggerEl.innerHTML = '<i class="fas fa-download"></i> تصدير CSV';
                }
            }
        };
    </script>
</body>
</html>
