<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة أسئلة رمضان | Ms. Mona Kamel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(145deg, #1a2639, #0c1a2b);
            min-height: 100vh;
            font-family: 'Cairo', sans-serif;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-login {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #ffd700;
            text-align: center;
        }
        
        .admin-login h2 {
            color: #ffd700;
            margin-bottom: 30px;
        }
        
        .admin-login button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            border-radius: 10px;
            color: #1a2639;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Cairo';
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .admin-login button img {
            width: 24px;
            height: 24px;
        }

        .ramadan-admin-panel {
            color: white;
        }

        .ramadan-admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .ramadan-admin-header h2 {
            color: #ffd700;
            font-size: 2rem;
            margin: 0;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .ramadan-admin-close, .ramadan-admin-logout {
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
            border: none;
        }

        .ramadan-admin-close {
            background: rgba(255,255,255,0.1);
            border: 1px solid #ffd700;
            color: #ffd700;
        }

        .ramadan-admin-logout {
            background: #ff7675;
            color: white;
        }

        .ramadan-admin-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .ramadan-stat-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .ramadan-stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .ramadan-stat-label {
            color: #ccc;
            margin-top: 10px;
        }

        .ramadan-admin-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .ramadan-admin-btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-family: 'Cairo';
            font-size: 1rem;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s;
        }

        .ramadan-admin-btn:hover {
            background: rgba(255,215,0,0.2);
        }

        .ramadan-admin-btn-primary {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1a2639;
            border: none;
        }

        .ramadan-admin-form {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: none;
        }

        .ramadan-admin-form.active {
            display: block;
        }

        .ramadan-admin-form label {
            color: #ffd700;
            display: block;
            margin: 15px 0 5px;
        }

        .ramadan-admin-form input,
        .ramadan-admin-form textarea,
        .ramadan-admin-form select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            color: white;
            font-family: 'Cairo';
            margin-bottom: 10px;
        }

        .ramadan-admin-form textarea {
            resize: vertical;
        }

        .ramadan-surahs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .ramadan-surah-item {
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            color: #ddd;
        }

        .ramadan-surah-item:hover {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
        }

        .ramadan-surah-item.selected {
            background: rgba(255,215,0,0.3);
            border-color: #ffd700;
            color: #ffd700;
            font-weight: bold;
        }

        .question-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            border-right: 4px solid #ffd700;
            margin-bottom: 15px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .question-day {
            color: #ffd700;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .question-text {
            color: white;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .question-answer {
            background: rgba(0,184,148,0.2);
            padding: 10px;
            border-radius: 8px;
            border-right: 3px solid #00b894;
            color: #00b894;
            margin: 10px 0;
        }

        .question-reference {
            color: #ffd700;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .ramadan-analysis-bar {
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 0;
        }

        .ramadan-analysis-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* جدول الإجابات */
        .answers-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .answers-table th,
        .answers-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        .answers-table th {
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            font-weight: bold;
        }

        .answers-table tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .status-correct {
            color: #00b894;
            font-weight: bold;
        }

        .status-wrong {
            color: #ff7675;
            font-weight: bold;
        }

        .export-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .filter-input {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            background: rgba(255,255,255,0.1);
            color: white;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="admin-container" id="adminContainer">
        <div id="adminLogin" class="admin-login">
            <h2>🔐 دخول الأدمن - رمضان</h2>
            <button onclick="loginWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                تسجيل الدخول بحساب Google
            </button>
        </div>
        
        <div id="ramadanAdminPanel" style="display: none;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8KQAQgu4nIiomoDpoTLnBz_uAtab63sY",
            authDomain: "monaacademy-cd983.firebaseapp.com",
            databaseURL: "https://monaacademy-cd983-default-rtdb.firebaseio.com",
            projectId: "monaacademy-cd983",
            storageBucket: "monaacademy-cd983.appspot.com",
            appId: "1:410646694761:web:bea49c51d3b0ff5eb9cbf8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ================ دالة حماية XSS ================
        function escapeHTML(str) {
            if (str === null || str === undefined) return '';
            if (typeof str !== 'string') str = String(str);
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const SURAHS = [
            "الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس",
            "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه",
            "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم",
            "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر",
            "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق",
            "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة",
            "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج",
            "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس",
            "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد",
            "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات",
            "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر",
            "المسد", "الإخلاص", "الفلق", "الناس"
        ];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const ADMIN_EMAIL = "mrsmonakamel6@gmail.com";
                let isAllowed = user.email === ADMIN_EMAIL;
                
                if (!isAllowed) {
                    try {
                        const adminsSnap = await get(ref(db, 'admins'));
                        const admins = adminsSnap.val() || {};
                        isAllowed = Object.values(admins).some(a => a.email === user.email);
                    } catch(e) {}
                }
                
                if (isAllowed) {
                    document.getElementById('adminLogin').style.display = 'none';
                    document.getElementById('ramadanAdminPanel').style.display = 'block';
                    loadAdminPanel();
                } else {
                    alert("❌ هذا الحساب غير مصرح له بالدخول.");
                    signOut(auth);
                }
            } else {
                document.getElementById('adminLogin').style.display = 'block';
                document.getElementById('ramadanAdminPanel').style.display = 'none';
            }
        });

        window.loginWithGoogle = async function() {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Google Sign-In Error:", error);
                alert("❌ حدث خطأ في تسجيل الدخول: " + error.message);
            }
        };

        window.logoutAdmin = async function() {
            await signOut(auth);
        };

        async function loadAdminPanel() {
            const panel = document.getElementById('ramadanAdminPanel');
            
            const today = new Date();
            const ramadanStart = new Date(today.getFullYear(), 2, 11);
            const dayOfRamadan = Math.min(30, Math.max(1, Math.floor((today - ramadanStart) / (1000 * 60 * 60 * 24)) + 1));
            
            let html = `
                <div class="ramadan-admin-panel">
                    <div class="ramadan-admin-header">
                        <h2><i class="fas fa-moon"></i> إدارة أسئلة رمضان <i class="fas fa-star"></i></h2>
                        <div class="header-buttons">
                            <button class="ramadan-admin-logout" onclick="logoutAdmin()">
                                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                            </button>
                            <button class="ramadan-admin-close" onclick="window.location.href='index.html'">
                                <i class="fas fa-home"></i> العودة للرئيسية
                            </button>
                        </div>
                    </div>
                    
                    <div class="ramadan-admin-stats">
                        <div class="ramadan-stat-card">
                            <div class="ramadan-stat-number" id="totalQuestions">0</div>
                            <div class="ramadan-stat-label">إجمالي الأسئلة</div>
                        </div>
                        <div class="ramadan-stat-card">
                            <div class="ramadan-stat-number" id="todayAnswers">0</div>
                            <div class="ramadan-stat-label">إجابات اليوم</div>
                        </div>
                        <div class="ramadan-stat-card">
                            <div class="ramadan-stat-number" id="totalAnswers">0</div>
                            <div class="ramadan-stat-label">إجمالي الإجابات</div>
                        </div>
                        <div class="ramadan-stat-card">
                            <div class="ramadan-stat-number" id="correctAnswers">0</div>
                            <div class="ramadan-stat-label">إجابات صحيحة</div>
                        </div>
                    </div>
                    
                    <div class="ramadan-admin-actions">
                        <button class="ramadan-admin-btn ramadan-admin-btn-primary" onclick="showAddQuestionForm()">
                            <i class="fas fa-plus"></i> إضافة سؤال جديد
                        </button>
                        <button class="ramadan-admin-btn" onclick="exportAnswers()">
                            <i class="fas fa-download"></i> تصدير الإجابات
                        </button>
                        <input type="text" id="studentIdFilter" class="filter-input" placeholder="فلترة بكود الطالب" onkeyup="filterAnswers()">
                    </div>
                    
                    <div id="addQuestionForm" class="ramadan-admin-form">
                        <h3 style="color: #ffd700; margin-bottom: 20px;">➕ إضافة سؤال جديد</h3>
                        
                        <label>اليوم (1-30)</label>
                        <input type="number" id="questionDay" min="1" max="30" value="${dayOfRamadan}">
                        
                        <label>السؤال</label>
                        <textarea id="questionText" rows="3" placeholder="اكتب السؤال هنا..."></textarea>
                        
                        <div style="background: rgba(255,215,0,0.1); padding: 20px; border-radius: 15px; margin: 20px 0;">
                            <p style="color: #ffd700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                                <i class="fas fa-quran" style="font-size: 1.2rem;"></i>
                                <strong>الإجابة الصحيحة (اختر السورة ورقم الآية)</strong>
                            </p>
                            
                            <label>اختر السورة</label>
                            <div class="ramadan-surahs-grid" id="surahsGrid"></div>
                            
                            <label>رقم الآية</label>
                            <input type="number" id="ayaNumber" min="1" placeholder="أدخل رقم الآية">
                            
                            <p style="color: #00b894; margin-top: 10px; font-size: 0.9rem;">
                                ⚡ سيتم حفظ: <span id="selectedAnswerPreview">لم يتم اختيار سورة بعد</span>
                            </p>
                        </div>
                        
                        <label>تفسير مختصر (اختياري)</label>
                        <textarea id="tafseer" rows="2" placeholder="تفسير مختصر للآية..."></textarea>
                        
                        <div style="display: flex; gap: 10px; margin-top: 20px;">
                            <button class="ramadan-admin-btn ramadan-admin-btn-primary" onclick="saveQuestion()">
                                <i class="fas fa-save"></i> حفظ السؤال
                            </button>
                            <button class="ramadan-admin-btn" onclick="hideAddQuestionForm()">
                                <i class="fas fa-times"></i> إلغاء
                            </button>
                        </div>
                    </div>
                    
                    <div id="questionsList" class="ramadan-questions-list">
                        <h3 style="color: #ffd700; margin-bottom: 20px;">📋 الأسئلة المضافة</h3>
                        <div id="questionsGrid"></div>
                    </div>
                    
                    <div id="answersSection" style="margin-top: 30px;">
                        <h3 style="color: #ffd700; margin-bottom: 20px;">📝 جميع الإجابات</h3>
                        <div style="overflow-x: auto;">
                            <table class="answers-table" id="answersTable">
                                <thead>
                                    <tr>
                                        <th>اليوم</th>
                                        <th>الاسم</th>
                                        <th>كود الطالب</th>
                                        <th>الإجابة</th>
                                        <th>الإجابة الصحيحة</th>
                                        <th>النتيجة</th>
                                        <th>التاريخ</th>
                                    </tr>
                                </thead>
                                <tbody id="answersTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div id="analysisSection" class="ramadan-daily-analysis" style="margin-top: 30px;">
                        <h3 style="color: #ffd700; margin-bottom: 20px;">📊 تحليل الإجابات</h3>
                        <div id="analysisContent"></div>
                    </div>
                </div>
            `;
            
            panel.innerHTML = html;
            
            const surahsGrid = document.getElementById('surahsGrid');
            SURAHS.forEach(surah => {
                const div = document.createElement('div');
                div.className = 'ramadan-surah-item';
                div.textContent = surah;
                div.onclick = () => {
                    document.querySelectorAll('.ramadan-surah-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    updateAnswerPreview();
                };
                surahsGrid.appendChild(div);
            });
            
            const ayaInput = document.getElementById('ayaNumber');
            if (ayaInput) {
                ayaInput.addEventListener('input', updateAnswerPreview);
            }
            
            loadQuestions();
            loadStats();
            loadAnswersTable();
            
            onValue(ref(db, 'ramadan_questions'), () => {
                loadQuestions();
                loadStats();
            });
            
            onValue(ref(db, 'ramadan_answers'), () => {
                loadStats();
                loadAnswersTable();
            });
        }

        function updateAnswerPreview() {
            const selectedSurah = document.querySelector('.ramadan-surah-item.selected');
            const ayaNumber = document.getElementById('ayaNumber').value;
            const preview = document.getElementById('selectedAnswerPreview');
            
            if (selectedSurah && ayaNumber) {
                preview.innerHTML = `<span style="color: #00b894;">${selectedSurah.textContent} - الآية ${ayaNumber}</span>`;
            } else if (selectedSurah) {
                preview.innerHTML = `<span style="color: #ffd700;">${selectedSurah.textContent} - (يرجى إدخال رقم الآية)</span>`;
            } else {
                preview.innerHTML = 'لم يتم اختيار سورة بعد';
            }
        }

        window.showAddQuestionForm = function() {
            document.getElementById('addQuestionForm').classList.add('active');
        };

        window.hideAddQuestionForm = function() {
            document.getElementById('addQuestionForm').classList.remove('active');
        };

        window.saveQuestion = async function() {
            const day = document.getElementById('questionDay').value;
            const text = document.getElementById('questionText').value;
            const selectedSurah = document.querySelector('.ramadan-surah-item.selected');
            const ayaNumber = document.getElementById('ayaNumber').value;
            const tafseer = document.getElementById('tafseer').value;
            
            if (!day || !text || !selectedSurah || !ayaNumber) {
                alert('❌ يرجى ملء جميع الحقول المطلوبة (اليوم، السؤال، السورة، رقم الآية)');
                return;
            }
            
            const correctAnswerText = `${selectedSurah.textContent} - ${ayaNumber}`;
            
            const questionData = {
                day: parseInt(day),
                text: text,
                correctAnswer: correctAnswerText,
                surah: selectedSurah.textContent,
                aya: parseInt(ayaNumber),
                tafseer: tafseer || '',
                createdAt: new Date().toLocaleString('ar-EG'),
                isActive: true
            };
            
            try {
                const newQuestionRef = push(ref(db, 'ramadan_questions'));
                await set(newQuestionRef, questionData);
                
                alert('✅ تم حفظ السؤال بنجاح');
                hideAddQuestionForm();
                loadQuestions();
                
                document.getElementById('questionText').value = '';
                document.getElementById('ayaNumber').value = '';
                document.getElementById('tafseer').value = '';
                document.querySelectorAll('.ramadan-surah-item').forEach(el => el.classList.remove('selected'));
                document.getElementById('selectedAnswerPreview').innerHTML = 'لم يتم اختيار سورة بعد';
            } catch (error) {
                console.error('Error saving question:', error);
                alert('❌ حدث خطأ في حفظ السؤال: ' + error.message);
            }
        };

        window.editQuestion = async function(questionId) {
            const snap = await get(ref(db, `ramadan_questions/${questionId}`));
            if (!snap.exists()) { alert('❌ السؤال غير موجود'); return; }
            const q = snap.val();
            
            // إظهار فورم الإضافة وملئه ببيانات السؤال
            document.getElementById('addQuestionForm').classList.add('active');
            document.getElementById('questionDay').value = q.day;
            document.getElementById('questionText').value = q.text;
            document.getElementById('ayaNumber').value = q.aya;
            if (q.tafseer) document.getElementById('tafseer').value = q.tafseer;
            
            // اختيار السورة الصحيحة
            document.querySelectorAll('.ramadan-surah-item').forEach(el => {
                el.classList.remove('selected');
                if (el.textContent === q.surah) el.classList.add('selected');
            });
            updateAnswerPreview();
            
            // تغيير زر الحفظ ليحدّث بدل الإضافة
            const saveBtn = document.querySelector('#addQuestionForm .ramadan-admin-btn-primary');
            if (saveBtn) {
                saveBtn.innerHTML = '<i class="fas fa-save"></i> تحديث السؤال';
                saveBtn.onclick = async function() {
                    const day = document.getElementById('questionDay').value;
                    const text = document.getElementById('questionText').value;
                    const selectedSurah = document.querySelector('.ramadan-surah-item.selected');
                    const ayaNumber = document.getElementById('ayaNumber').value;
                    const tafseer = document.getElementById('tafseer').value;
                    
                    if (!day || !text || !selectedSurah || !ayaNumber) {
                        alert('❌ يرجى ملء جميع الحقول المطلوبة');
                        return;
                    }
                    
                    const correctAnswerText = `${selectedSurah.textContent} - ${ayaNumber}`;
                    try {
                        await update(ref(db, `ramadan_questions/${questionId}`), {
                            day: parseInt(day),
                            text: text,
                            correctAnswer: correctAnswerText,
                            surah: selectedSurah.textContent,
                            aya: parseInt(ayaNumber),
                            tafseer: tafseer || '',
                            updatedAt: new Date().toLocaleString('ar-EG')
                        });
                        alert('✅ تم تحديث السؤال بنجاح');
                        hideAddQuestionForm();
                        // إعادة زر الحفظ لوضعه الأصلي
                        saveBtn.innerHTML = '<i class="fas fa-save"></i> حفظ السؤال';
                        saveBtn.onclick = saveQuestion;
                        loadQuestions();
                    } catch(err) {
                        alert('❌ حدث خطأ: ' + err.message);
                    }
                };
            }
            
            // scroll للفورم
            document.getElementById('addQuestionForm').scrollIntoView({ behavior: 'smooth' });
        };

        window.deleteQuestion = async function(questionId) {
            if (!confirm('هل أنت متأكد من حذف هذا السؤال؟')) return;
            
            try {
                await remove(ref(db, `ramadan_questions/${questionId}`));
                alert('✅ تم حذف السؤال');
                loadQuestions();
            } catch (error) {
                console.error('Error deleting question:', error);
                alert('❌ حدث خطأ في الحذف');
            }
        };

        async function loadQuestions() {
            const questionsGrid = document.getElementById('questionsGrid');
            if (!questionsGrid) return;
            
            const snapshot = await get(ref(db, 'ramadan_questions'));
            
            if (!snapshot.exists()) {
                questionsGrid.innerHTML = '<p style="color: #666;">لا توجد أسئلة مضافة بعد</p>';
                return;
            }
            
            let html = '';
            
            const questions = [];
            snapshot.forEach(child => {
                questions.push({ id: child.key, ...child.val() });
            });
            
            questions.sort((a, b) => a.day - b.day);
            
            questions.forEach(q => {
                html += `
                    <div class="question-card">
                        <div class="question-header">
                            <span class="question-day">📅 اليوم ${escapeHTML(String(q.day))}</span>
                            <div style="display:flex; gap:8px;">
                                <button class="ramadan-admin-btn" onclick="editQuestion('${escapeHTML(q.id)}')" style="padding: 5px 15px; background: rgba(108,92,231,0.3); border-color: #6c5ce7; color: #a29bfe;">
                                    <i class="fas fa-edit"></i> تعديل
                                </button>
                                <button class="ramadan-admin-btn" onclick="deleteQuestion('${escapeHTML(q.id)}')" style="padding: 5px 15px;">
                                    <i class="fas fa-trash"></i> حذف
                                </button>
                            </div>
                        </div>
                        <div class="question-text">${escapeHTML(q.text)}</div>
                        <div class="question-answer">
                            <i class="fas fa-check-circle"></i> 
                            الإجابة الصحيحة: ${escapeHTML(q.correctAnswer)}
                        </div>
                        <div class="question-reference">
                            <i class="fas fa-quran"></i> ${escapeHTML(q.surah)} - آية ${escapeHTML(String(q.aya))}
                        </div>
                        ${q.tafseer ? `
                            <div style="margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; color: #aaa;">
                                <i class="fas fa-book-open"></i> ${escapeHTML(q.tafseer)}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            questionsGrid.innerHTML = html;
            
            document.getElementById('totalQuestions').textContent = questions.length;
        }

        async function loadStats() {
            const answersSnapshot = await get(ref(db, 'ramadan_answers'));
            
            if (!answersSnapshot.exists()) {
                document.getElementById('totalAnswers').textContent = '0';
                document.getElementById('todayAnswers').textContent = '0';
                document.getElementById('correctAnswers').textContent = '0';
                return;
            }
            
            let totalAnswers = 0;
            let todayAnswers = 0;
            let correctAnswers = 0;
            
            const today = new Date().toLocaleDateString('ar-EG');
            
            answersSnapshot.forEach(child => {
                const answer = child.val();
                totalAnswers++;
                
                if (answer.date === today) todayAnswers++;
                if (answer.isCorrect) correctAnswers++;
            });
            
            document.getElementById('totalAnswers').textContent = totalAnswers;
            document.getElementById('todayAnswers').textContent = todayAnswers;
            document.getElementById('correctAnswers').textContent = correctAnswers;
            
            loadAnalysis();
        }

        async function loadAnswersTable() {
            const tbody = document.getElementById('answersTableBody');
            if (!tbody) return;
            
            const [answersSnap, questionsSnap] = await Promise.all([
                get(ref(db, 'ramadan_answers')),
                get(ref(db, 'ramadan_questions'))
            ]);
            
            if (!answersSnap.exists()) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">لا توجد إجابات بعد</td></tr>';
                return;
            }
            
            // تجهيز خريطة الإجابات الصحيحة لكل يوم
            const correctAnswersMap = {};
            if (questionsSnap.exists()) {
                questionsSnap.forEach(child => {
                    const q = child.val();
                    correctAnswersMap[q.day] = q.correctAnswer;
                });
            }
            
            const answers = [];
            answersSnap.forEach(child => {
                answers.push(child.val());
            });
            
            // ترتيب تنازلي حسب التاريخ
            answers.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            let rows = '';
            answers.forEach(ans => {
                const correctAns = correctAnswersMap[ans.day] || 'غير معروف';
                rows += `
                    <tr>
                        <td>${escapeHTML(String(ans.day))}</td>
                        <td>${escapeHTML(ans.name)}</td>
                        <td>${escapeHTML(ans.studentId || 'غير محدد')}</td>
                        <td>${escapeHTML(ans.answer)}</td>
                        <td>${escapeHTML(correctAns)}</td>
                        <td class="${ans.isCorrect ? 'status-correct' : 'status-wrong'}">
                            ${ans.isCorrect ? '✓ صحيحة' : '✗ خاطئة'}
                        </td>
                        <td>${escapeHTML(ans.date)}</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = rows;
        }

        window.filterAnswers = function() {
            const filter = document.getElementById('studentIdFilter').value.trim().toLowerCase();
            const rows = document.querySelectorAll('#answersTableBody tr');
            
            rows.forEach(row => {
                const studentIdCell = row.cells[2];
                if (studentIdCell) {
                    const studentId = studentIdCell.textContent.toLowerCase();
                    if (filter === '' || studentId.includes(filter)) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                }
            });
        };

        async function loadAnalysis() {
            const analysisContent = document.getElementById('analysisContent');
            if (!analysisContent) return;
            
            const answersSnapshot = await get(ref(db, 'ramadan_answers'));
            
            if (!answersSnapshot.exists()) {
                analysisContent.innerHTML = '<p style="color: #666;">لا توجد إجابات بعد</p>';
                return;
            }
            
            const answersByDay = {};
            const correctByDay = {};
            
            answersSnapshot.forEach(child => {
                const answer = child.val();
                if (!answersByDay[answer.day]) {
                    answersByDay[answer.day] = 0;
                    correctByDay[answer.day] = 0;
                }
                answersByDay[answer.day]++;
                if (answer.isCorrect) correctByDay[answer.day]++;
            });
            
            let html = '';
            for (let day = 1; day <= 30; day++) {
                const total = answersByDay[day] || 0;
                const correct = correctByDay[day] || 0;
                const percentage = total > 0 ? Math.round((correct / total) * 100) : 0;
                
                html += `
                    <div style="margin-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; color: white; margin-bottom: 5px;">
                            <span>📅 اليوم ${day}</span>
                            <span>${correct} / ${total} (${percentage}%)</span>
                        </div>
                        <div class="ramadan-analysis-bar">
                            <div class="ramadan-analysis-fill" style="width: ${percentage}%;"></div>
                        </div>
                    </div>
                `;
            }
            
            analysisContent.innerHTML = html;
        }

        window.exportAnswers = async function() {
            const answersSnapshot = await get(ref(db, 'ramadan_answers'));
            const questionsSnapshot = await get(ref(db, 'ramadan_questions'));
            
            if (!answersSnapshot.exists()) {
                alert('لا توجد إجابات للتصدير');
                return;
            }
            
            const questions = {};
            if (questionsSnapshot.exists()) {
                questionsSnapshot.forEach(child => {
                    questions[child.val().day] = child.val().correctAnswer;
                });
            }
            
            const answers = [];
            answersSnapshot.forEach(child => {
                answers.push(child.val());
            });
            
            const csv = [
                ['اليوم', 'الاسم', 'كود الطالب', 'الإجابة', 'الإجابة الصحيحة', 'صحيحة؟', 'التاريخ'],
                ...answers.map(a => [
                    a.day, 
                    a.name, 
                    a.studentId || '',
                    a.answer,
                    questions[a.day] || 'غير معروف',
                    a.isCorrect ? 'نعم' : 'لا', 
                    a.date
                ])
            ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
            
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `ramadan_answers_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`;
            link.click();
        };
    </script>
</body>
</html>
